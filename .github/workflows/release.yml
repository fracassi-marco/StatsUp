name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write local.properties
        run: |
          echo "maps.apiKey=${{ secrets.MAPS_API_KEY }}" >> local.properties
          echo "strava.clientId=${{ secrets.STRAVA_CLIENT_ID }}" >> local.properties
          echo "strava.clientSecret=${{ secrets.STRAVA_CLIENT_SECRET }}" >> local.properties
          echo "signing.keystoreFile=keystore.jks" >> local.properties
          echo "signing.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | tr -d '\n' | base64 --decode > keystore.jks

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/statsup.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/statsup.apk
          retention-days: 30

      # Disabled: Play Console not yet configured
      # - name: Publish to Google Play (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.statsup
      #     releaseFiles: app/build/outputs/bundle/release/*.aab
      #     track: internal
      #     status: completed
      #     whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/statsup.apk
          generate_release_notes: true
