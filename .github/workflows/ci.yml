name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.MAPS_API_KEY }}" ] && missing+=("MAPS_API_KEY")
          [ -z "${{ secrets.INTERVALS_ICU_CLIENT_ID }}" ] && missing+=("INTERVALS_ICU_CLIENT_ID")
          [ -z "${{ secrets.INTERVALS_ICU_CLIENT_SECRET }}" ] && missing+=("INTERVALS_ICU_CLIENT_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "WARNING: missing secrets: ${missing[*]} — APK will be built with empty values"
          fi

      - name: Write local.properties
        run: |
          echo "maps.apiKey=${{ secrets.MAPS_API_KEY }}" >> local.properties
          echo "intervals.icu.clientId=${{ secrets.INTERVALS_ICU_CLIENT_ID }}" >> local.properties
          echo "intervals.icu.clientSecret=${{ secrets.INTERVALS_ICU_CLIENT_SECRET }}" >> local.properties

      - name: Check translations
        run: bash scripts/check_translations.sh

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.*
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
