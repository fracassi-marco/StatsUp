<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — StatsUp</title>
  <meta name="description" content="Historial de versiones y changelog para StatsUp — Tu compañero de Strava Analytics." />

  <link rel="alternate" hreflang="x-default" href="https://fracassi-marco.github.io/StatsUp/changelog.html" />
  <link rel="alternate" hreflang="en" href="https://fracassi-marco.github.io/StatsUp/changelog.html" />
  <link rel="alternate" hreflang="it" href="https://fracassi-marco.github.io/StatsUp/it/changelog.html" />
  <link rel="alternate" hreflang="de" href="https://fracassi-marco.github.io/StatsUp/de/changelog.html" />
  <link rel="alternate" hreflang="es" href="https://fracassi-marco.github.io/StatsUp/es/changelog.html" />
  <link rel="alternate" hreflang="fr" href="https://fracassi-marco.github.io/StatsUp/fr/changelog.html" />

  <link rel="icon" type="image/png" href="https://fracassi-marco.github.io/StatsUp/assets/images/logo.png" />
  <link rel="shortcut icon" href="https://fracassi-marco.github.io/StatsUp/assets/images/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF5722;
      --orange-light: #FF7043;
      --orange-dark: #E64A19;
      --orange-glow: rgba(255, 87, 34, 0.25);
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --surface: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --text-muted: #888;
      --green: #4CAF50;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav-logo span { color: var(--orange); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text); }

    /* ── LANG SWITCHER ── */
    .lang-switcher {
      display: flex;
      gap: 0.15rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.2rem;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .lang-btn:hover { color: var(--text); }

    .lang-btn.active {
      background: var(--orange);
      color: white;
    }

    @media (max-width: 540px) {
      .lang-switcher { display: none; }
    }

    /* ── HEADER ── */
    .page-header {
      padding: 8rem 2rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(255,87,34,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-header .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.75rem;
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .page-header p {
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* ── TIMELINE ── */
    .timeline {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 2rem 6rem;
    }

    .timeline-entry {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 0 2.5rem;
      position: relative;
      padding-bottom: 2.5rem;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: 161px;
      top: 28px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .timeline-entry:last-child::before { display: none; }

    .timeline-meta {
      text-align: right;
      padding-top: 0.2rem;
      padding-right: 1.5rem;
    }

    .version-tag {
      display: inline-block;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.01em;
    }

    .release-date {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .timeline-dot {
      position: absolute;
      left: 154px;
      top: 8px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--orange);
      border: 2px solid var(--bg);
      box-shadow: 0 0 10px var(--orange-glow);
      flex-shrink: 0;
    }

    .timeline-dot.latest {
      width: 18px;
      height: 18px;
      left: 153px;
      top: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px var(--orange-glow); }
      50% { box-shadow: 0 0 20px rgba(255,87,34,0.5); }
    }

    .timeline-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }

    .timeline-content:hover {
      border-color: rgba(255,87,34,0.25);
    }

    .timeline-content p {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-line;
    }

    .latest-badge {
      display: block;
      background: rgba(76,175,80,0.15);
      border: 1px solid rgba(76,175,80,0.35);
      color: var(--green);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 100px;
      margin-bottom: 0.3rem;
      text-align: right;
    }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 4rem 2rem;
      font-size: 0.95rem;
    }

    /* ── FOOTER ── */
    footer {
      padding: 3rem 2rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 1rem;
    }

    .footer-logo img { width: 28px; height: 28px; border-radius: 7px; }
    .footer-logo span { color: var(--orange); }

    footer p { font-size: 0.8rem; color: var(--text-muted); }
    footer a { color: var(--orange); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      nav { padding: 0.75rem 1rem; }
      .timeline-entry {
        grid-template-columns: 1fr;
        padding-left: 1.5rem;
      }
      .timeline-entry::before {
        left: 6px;
        top: 36px;
      }
      .timeline-dot { left: 0; top: 10px; }
      .timeline-dot.latest { left: -1px; }
      .timeline-meta { text-align: left; margin-bottom: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="../assets/images/logo.png" alt="StatsUp logo" />
      Stats<span>Up</span>
    </a>
    <div class="nav-right">
      <span class="lang-switcher-slot"></span>
      <a href="index.html" class="nav-back">← Volver al inicio</a>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <div class="page-header-bg"></div>
    <div class="label">Historial de versiones</div>
    <h1>Changelog</h1>
    <p>Novedades de cada versión de StatsUp</p>
  </div>

  <!-- TIMELINE -->
  <div class="timeline" id="timeline">
    <div class="state-msg">Cargando changelog…</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html" class="footer-logo">
      <img src="../assets/images/logo.png" alt="StatsUp" />
      Stats<span>Up</span>
    </a>
    <p style="margin-bottom:0.5rem">Hecho con ❤️ para atletas que aman sus datos.</p>
    <p>
      <a href="https://github.com/fracassi-marco/StatsUp" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      <a href="mailto:fracassi.marco@gmail.com">Contacto</a>
      &nbsp;·&nbsp;
      <a href="privacy.html">Privacidad</a>
    </p>
    <p style="margin-top:1rem;font-size:0.7rem;opacity:0.4">StatsUp no está afiliado con Strava Inc.</p>
  </footer>

  <script>
    window.langUrls = {en:'../changelog.html',it:'../it/changelog.html',de:'../de/changelog.html',es:'./changelog.html',fr:'../fr/changelog.html'};
  </script>
  <script src="../i18n.js"></script>
  <script>
    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    fetch('../changelog.json?t=' + Date.now())
      .then(r => r.json())
      .then(entries => {
        const container = document.getElementById('timeline');
        if (!entries || entries.length === 0) {
          container.innerHTML = '<div class="state-msg">' + 'Aún no hay versiones.' + '</div>';
          return;
        }

        const latestLabel = 'Última';

        container.innerHTML = entries.map((entry, i) => `
          <div class="timeline-entry">
            <div class="timeline-meta">
              ${i === 0 ? '<span class="latest-badge">' + latestLabel + '</span>' : ''}
              <span class="version-tag">v${entry.version}</span>
              <span class="release-date">${formatDate(entry.date)}</span>
            </div>
            <div class="timeline-dot ${i === 0 ? 'latest' : ''}"></div>
            <div class="timeline-content">
              <p>${escapeHtml(entry.message)}</p>
            </div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('timeline').innerHTML =
          '<div class="state-msg">' + 'No se pudo cargar el changelog.' + '</div>';
      });
  </script>

</body>
</html>
